name: Auto-Comment on Push
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      issueKey:
        description: 'Jira issue key that triggered this'
        required: false
        default: 'none'
jobs:
  notify-jira:
    runs-on: ubuntu-latest
    steps:
      - name: Report push to Jira
        run: |
          curl -s -X POST "https://4be30d12-1f7b-48f3-aee6-a33ec7f2211f.hello.atlassian-dev.net/x1/8I3zGANTp2xeaENTAZH5s6Iy1N4?issueKey=TEST-4&commentText=A%20new%20commit%20was%20just%20pushed%20to%20GitHub%20(cloudtechmasters%2Fgitbranchingstrategy%2C%20branch%20main).%20This%20comment%20was%20posted%20automatically%20by%20GitHub%20Actions%2C%20with%20no%20manual%20trigger%20involved%20-%20proving%20GitHub%20can%20independently%20act%20on%20Jira."
